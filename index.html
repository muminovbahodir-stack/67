<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Tutor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #18222d;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #2481cc;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-message {
            background-color: #202b36;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        #input-container {
            display: flex;
            padding: 10px;
            background-color: #18222d;
            border-top: 1px solid #202b36;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background-color: #202b36;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }
        button {
            background-color: #2481cc;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message bot-message">👋 Hello! I am your AI English Tutor. Let's talk! How was your day?</div>
    </div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">➔</button>
    </div>

    <script>
        // Активируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Полностью автоматический поиск бэкенда! Работает на любой ссылке туннеля
        const BACKEND_URL = window.location.origin + "/chat";

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-message' : 'bot-message');
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            messageInput.value = '';

            appendMessage("Thinking...", false);
            const thinkingMessage = chatContainer.lastChild;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text }) // Строго совпадает с Pydantic моделью
                });

                if (!response.ok) {
                    throw new Error(`Ошибка: ${response.status}`);
                }

                const data = await response.json();
                thinkingMessage.innerText = data.reply;
            } catch (error) {
                console.error(error);
                thinkingMessage.innerText = "❌ Ошибка соединения. Проверь, запущен ли Python сервер.";
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
