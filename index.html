<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Tutor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #18222d);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-message {
            background-color: var(--tg-theme-secondary-bg-color, #202b36);
            color: var(--tg-theme-text-color, #ffffff);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        #input-container {
            display: flex;
            padding: 10px;
            background-color: var(--tg-theme-bg-color, #18222d);
            border-top: 1px solid var(--tg-theme-secondary-bg-color, #202b36);
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background-color: var(--tg-theme-secondary-bg-color, #202b36);
            color: var(--tg-theme-text-color, #ffffff);
            font-size: 16px;
            outline: none;
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message bot-message">👋 Hello! I am your AI English Tutor. Let's talk! How was your day?</div>
    </div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="Type a message in English..." autocomplete="off">
        <button id="send-btn">➔</button>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем окно на весь экран телефона

        // !!! ВНИМАНИЕ: ЗАМЕНИ ССЫЛКУ НИЖЕ НА СВОЮ ИЗ ТЕРМИНАЛА !!!
        const BACKEND_URL = "https://ТВОИ_БУКВЫ_ИЗ_ТЕРМИНАЛА.lhr.life/chat";

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // Функция добавления сообщения на экран
        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-message' : 'bot-message');
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight; // Скролл вниз
        }

        // Функция отправки запроса на твой Python-сервер
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            appendMessage(text, true); // Добавляем сообщение юзера на экран
            messageInput.value = ''; // Очищаем поле ввода

            // Показываем индикатор, что бот думает
            appendMessage("Thinking...", false);
            const thinkingMessage = chatContainer.lastChild;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }

                const data = await response.json();
                thinkingMessage.innerText = data.reply; // Заменяем "Thinking..." на ответ ИИ
            } catch (error) {
                console.error(error);
                thinkingMessage.innerText = "❌ Ошибка соединения с Python-сервером. Проверь, работает ли PyCharm и туннель!";
            }
        }

        sendBtn.addEventListener('click', sendMessage);
